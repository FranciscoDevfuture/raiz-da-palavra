<body>

<header class="biblia-header">
  <div class="wrap">
    <a class="voltar" href="index.html">&larr; Raiz da Palavra</a>
    <h1>Bíblia Online</h1>
    <p class="subtitulo">Leia e compare diferentes versões, no seu ritmo</p>
  </div>
</header>

<div class="biblia-controles">
  <div class="wrap">
    <div class="controle-linha">
      <select id="select-versao" class="biblia-select" aria-label="Escolher versão da Bíblia">
        <option value="ntlh">Linguagem de Hoje (NTLH)</option>
        <option value="ara">Almeida Revista e Atualizada</option>
        <option value="nvt">Nova Versão Transformadora</option>
        <option value="avemaria">Edição Católica (Ave Maria)</option>
      </select>
    </div>
    <div class="controle-linha">
      <select id="select-livro" class="biblia-select" aria-label="Escolher livro"></select>
      <select id="select-capitulo" class="biblia-select" aria-label="Escolher capítulo" style="flex: 0 0 80px;"></select>
    </div>
    <div class="controle-linha">
      <div class="nav-capitulo" style="flex: 1;">
        <button id="btn-anterior" class="nav-btn" type="button">&larr; Anterior</button>
        <button id="btn-proximo" class="nav-btn" type="button">Próximo &rarr;</button>
      </div>
      <div class="fonte-btns">
        <button id="fonte-menor" class="fonte-btn" type="button" aria-label="Diminuir fonte">A</button>
        <button id="fonte-maior" class="fonte-btn" type="button" aria-label="Aumentar fonte">A</button>
      </div>
    </div>
  </div>
</div>

<div class="biblia-texto" id="biblia-texto-wrap">
  <div class="wrap">
    <div id="biblia-texto-conteudo">
      <p class="estado-msg">Carregando…</p>
    </div>
  </div>
</div>
